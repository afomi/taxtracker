# Directory of taxpayer associations — civic organizations that advocate on tax
# and public-spending issues. These are potential collaborators and data sources,
# NOT neutral publishers: most advocate for lower taxes / spending restraint.
# The page frames them as advocacy organizations, per TaxTracker's even-handed stance.
#
# Seeded from two corroborating rosters (HJTA "Important Links" and the Solano
# County Taxpayers' Association links page), verified 2026-07-02. URLs as listed
# by those sources; individual sites not each re-verified live.
#
# Fields:
#   name    – organization name
#   url     – website (or best available link, e.g. Facebook page)
#   state   – two-letter state, or "National" for nationwide orgs (used to group the page)
#   scope   – geographic coverage
#   level   – state | region | county | city
#   note    – optional qualifier

directories:
  - name: Howard Jarvis Taxpayers Association — Important Links
    url: https://www.hjta.org/resources/important-links/
    note: Maintained roster of allied California local taxpayer associations.
  - name: CalTax (California Taxpayers Association)
    url: https://caltax.org/
    note: Statewide association; convenes a monthly collaborative of local groups.

