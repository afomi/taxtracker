url: "https://taxtracker.org" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: "" # the subpath of your site, e.g. /blog
title: "TaxTracker – See where taxes come from and go"
description: >-
  A transparent, sourced inventory of U.S. taxes that traces money from
  origination through collection to expenditure.
lang: en-US
logo: /assets/images/tax-tracker-mark.svg
twitter:
  username: randw
  card: summary
social:
  name: TaxTracker
  links:
    - https://github.com/afomi/taxtracker
    - https://x.com/randw
repo:
  url: https://github.com/afomi/taxtracker

contact:
  email_user: ryan          # everything before the @
  email_domain: civic.studio
  repo_url: https://github.com/afomi/taxtracker
donations:
  bsv_address: "1J12o2k964mJPTuS53Un7oJ2Hxo5ksYf4L"

plugins:
  - jekyll-datapage-generator
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - tailwind.config.js
  - package.json
  - package-lock.json
  - node_modules/
  - lib/
  - schema/
  - package*.json
  - Gemfile*
  - CONTRIBUTING.md
  - README.md
  - scripts/
  - .github/
  - _data/compiled/*.json # compiled data isn't a page
  - assets/css/main.css # Tailwind source file

collections:
  jurisdictions:
    output: true
    permalink: /jurisdictions/:slug/

page_gen:
  - data: "compiled.taxes"    # _data/compiled/taxes.json -> array
    template: "tax"           # uses tax.html in the project root or _layouts/
    # Output dir per record is "<jurisdiction-slug>-<tax-slug>" so URLs are unique
    # (some tax slugs collide across jurisdictions, e.g. Vacaville & Solano "lodging-tax").
    name_expr: "record['jurisdiction']['slug'] + '-' + record['slug']"
    index_files: true         # emit <name>/index.html -> clean URLs with no .html
    dir: "taxes"
    page_data_prefix: tax